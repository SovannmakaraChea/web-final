<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>

  <link rel="stylesheet" href="../src/output.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family: "Quicksand", sans-serif;
    }

    .glass{
      backdrop-filter: blur(18px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-gray-950 via-indigo-950 to-gray-900 flex items-center justify-center overflow-hidden">

  <!-- Background Blur -->
  <div class="absolute top-0 left-0 w-72 h-72 bg-purple-600 rounded-full blur-3xl opacity-20"></div>
  <div class="absolute bottom-0 right-0 w-72 h-72 bg-blue-600 rounded-full blur-3xl opacity-20"></div>

  <!-- Login Card -->
  <div class="glass floating relative z-10 w-[90%] max-w-md p-8 rounded-3xl shadow-2xl">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="../img/istad-logo1.png" alt="logo" class="w-36">
    </div>

    <!-- Title -->
    <div class="text-center mb-8">
      

      <p class="text-gray-300 mt-2 margin-bottom-8">
        Login to continue your learning journey
      </p>
    </div>

    <!-- Form -->
    <form class="space-y-5">

      <!-- Email -->
      <div>
        <label class="text-gray-300 text-sm mb-2 block">
          Email Address
        </label>

        <input
          type="email"
          placeholder="Enter your email"
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 text-gray-400 placeholder-gray-400 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 transition duration-300"
        >
      </div>

      <!-- Password -->
      <div>
        <label class="text-gray-300 text-sm mb-2 block">
          Password
        </label>

        <input
          type="password"
          placeholder="Enter your password"
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 text-gray placeholder-gray-400 outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500 transition duration-300"
        >
      </div>

      <!-- Remember -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-gray-300">
          <input type="checkbox" class="accent-blue-500">
          Remember me
        </label>

        <a href="#" class="text-blue-400 hover:text-blue-300 transition">
          Forgot password?
        </a>
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:scale-[1.02] hover:shadow-xl hover:shadow-purple-500/20 text-gray-400 py-3 rounded-xl font-semibold transition duration-300"
      >
        Login
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center gap-4 my-6">
      <div class="h-px bg-white/10 flex-1"></div>
      <span class="text-gray-400 text-sm">OR</span>
      <div class="h-px bg-white/10 flex-1"></div>
    </div>

    <!-- Social Login -->
    <div class="grid grid-cols-2 gap-4">

      <button class="bg-white/10 border border-white/10 hover:bg-white/20 transition text-gray-400 py-3 rounded-xl font-medium">
       Google
      </button>

      <button class="bg-white/10 border border-white/10 hover:bg-white/20 transition text-gray-400 py-3 rounded-xl font-medium">
        GitHub
      </button>

    </div>

    <!-- Register -->
    <p class="text-center text-gray-400 mt-8">
      Don’t have an account?
      <a href="register.html" class="text-blue-400 hover:text-blue-300 font-semibold">
        Register
      </a>
    </p>

    <!-- Back -->
    <div class="text-center mt-6">
      <a
        href="index.html"
        class="text-gray-400 hover:text-white transition"
      >
        ← Back to Home
      </a>
    </div>

  </div>

</body>
</html>
