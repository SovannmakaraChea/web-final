<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register Page</title>

  <link rel="stylesheet" href="../src/output.css">
 
</head>

<body class="min-h-screen bg-gradient-to-br from-gray-950 via-indigo-950 to-gray-900 flex items-center justify-center overflow-hidden py-16 ">

  <!-- Background -->
  <div class="absolute top-0 left-0 w-72 h-72 bg-purple-600 rounded-full blur-3xl opacity-20"></div>
  <div class="absolute bottom-0 right-0 w-72 h-72 bg-blue-600 rounded-full blur-3xl opacity-20 "></div>

  <!-- Register Card -->
  <div class="glass floating w-[90%] max-w-md p-8 rounded-3xl shadow-2xl">
    <div class="flex justify-center mb-6">
      <img src="../img/istad-logo1.png" alt="logo" class="max-w-28">
    </div>
    <!-- Title -->
    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold text-gray-300">Create Account</h1>
      <p class="text-gray-300 mt-2">Join and start your learning journey</p>
    </div>

    <!-- Form -->
    <form class="space-y-6">

      <input type="text" placeholder="Full Name"
        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 text-gray-300 placeholder-gray-400 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 mb-4">

      <input type="email" placeholder="Email"
        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 text-gray-300 placeholder-gray-400 outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500 mb-4">

      <input type="password" placeholder="Password"
        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 text-gray-300 placeholder-gray-400 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 mb-4">

      <input type="password" placeholder="Confirm Password"
        class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 text-gray-300 placeholder-gray-400 outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500 mb-4">

      <button type="submit"
        class="w-full mt-2 bg-gradient-to-r from-blue-600 to-purple-600 text-gray-400 py-3 rounded-xl font-semibold hover:scale-[1.02] transition">
        Register
      </button>
    </form>
    <!-- Login Link -->
    <p class="text-center text-gray-400 mb-4">
      Already have an account?
      <a href="login.html" class="text-blue-400 hover:text-blue-300 font-semibold">
        Login
      </a>
    </p>

  </div>

</body>
</html>
